name: bluebuild
on:
  schedule:
    - cron: "42 06 * * *" # build at 05:54 UTC every day
    # (14 min after last ublue images start building)
  push:
    paths-ignore:
      - "**.md" # don't rebuild if only documentation has changed

  pull_request:
    paths-ignore:
      - "**.md" # don't rebuild if only documentation has changed
  workflow_dispatch: # allow manually triggering builds

concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
        fedora_version:
          - "44"

    steps:
      - name: Optimize build times
        shell: bash
        run: |
          echo 'set man-db/auto-update false' | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo rm -f /var/lib/man-db/auto-update
          sudo sed -i 's/^update_initramfs=.*/update_initramfs=no/' /etc/initramfs-tools/update-initramfs.conf

      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Replace version placeholder in recipe
        shell: bash
        run: |
          sed -i "s/FEDORA_VERSION/${{ matrix.fedora_version }}/g" ./recipes/${{ matrix.recipe }}

      - name: Verify base image
        uses: EyeCantCU/cosign-action/verify@v0.3.0
        with:
          containers: silverblue-main:${{ matrix.fedora_version }}
          registry: 'ghcr.io/ublue-os'
          pubkey: 'https://raw.githubusercontent.com/ublue-os/main/main/cosign.pub'

      - name: Build Custom Image
        uses: blue-build/github-action@v1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          build_chunked_oci: true
          max_layers: 128
          skip_checkout: true
          use_cache: false
          retry_push_count: 3
          verify_install: true
