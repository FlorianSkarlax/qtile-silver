modules:
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install: # system flatpaks we want all users to have and not remove
          - io.gitlab.librewolf-community
          - org.gnome.Papers
          - org.gnome.Loupe
          - org.gnome.TextEditor
          - org.gnome.font-viewer
          - org.gnome.Extensions
      - scope: user
