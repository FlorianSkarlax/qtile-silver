modules:
  - type: dnf
    install:
      packages:
        - nautilus
        - sushi # nautilus previewer
        - gnome-tweaks
    remove:
      packages:
        - gnome-software
        - gnome-software-rpm-ostree

  - type: gnome-extensions
    install:
      - 307 # Dash to Dock
      - 615 # AppIndicator and KStatusNotifierItem Support
      - 19  # User Themes

  - type: gschema-overrides
    include:
      - zz1-primary-paste.gschema.override
